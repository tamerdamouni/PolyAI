name: Deploy PolyAI

on:
  push:
    branches: [main, dev]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/PolyAI
            git fetch origin
            git reset --hard origin/dev

            cd /home/ubuntu/PolyAI/services/yolo
            source venv/bin/activate
            pip install -r requirements.txt
            deactivate
            sudo systemctl restart yolo.service

            cd /home/ubuntu/PolyAI/services/agent
            source venv/bin/activate
            pip install -r requirements.txt
            deactivate
            sudo systemctl restart agent.service

            cd /home/ubuntu/PolyAI/services/frontend
            npm install
            sudo systemctl restart frontend.service

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.PROD_INSTANCE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/PolyAI
            git fetch origin
            git reset --hard origin/main

            cd /home/ubuntu/PolyAI/services/yolo
            source venv/bin/activate
            pip install -r requirements.txt
            deactivate
            sudo systemctl restart yolo.service

            cd /home/ubuntu/PolyAI/services/agent
            source venv/bin/activate
            pip install -r requirements.txt
            deactivate
            sudo systemctl restart agent.service

            cd /home/ubuntu/PolyAI/services/frontend
            npm install
            sudo systemctl restart frontend.service
