name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run tests
        run: pytest tests/
        working-directory: services/yolo

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: services/yolo/coverage.xml
          fail_ci_if_error: true

  agent-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run agent tests
        run: pytest tests/
        working-directory: services/agent
        env:
          # Tests mock the LLM; boto3 resolves credentials lazily, so no real
          # AWS keys are needed to construct the Bedrock client at import.
          MODEL: openai.gpt-oss-20b-1:0
          AWS_REGION: us-east-1
