name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run tests
        run: pytest tests/
        working-directory: services/yolo

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: services/yolo/coverage.xml
          fail_ci_if_error: true

  agent-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run agent tests
        run: pytest tests/
        working-directory: services/agent
        env:
          # Tests mock the LLM, so the key is a dummy and is never used for a
          # real request — it only lets app.py construct the client at import.
          MODEL: openai:gpt-5.4-mini
          OPENAI_API_KEY: sk-test-not-used
